<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calsan CRM — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      background: #F7F9F8;
      color: #1e2a30;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      width: 80px; height: 80px;
      background: #2E6B46;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 40px; height: 40px; color: white; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #5a6b72; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #2E6B46; color: white;
      border: none; border-radius: 12px;
      padding: 12px 32px; font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again. Pending actions will sync automatically when you reconnect.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
